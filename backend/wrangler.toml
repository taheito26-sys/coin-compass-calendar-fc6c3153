name = "cryptotracker-api"
main = "src/index.ts"
compatibility_date = "2025-03-01"
compatibility_flags = ["nodejs_compat"]

[vars]
# Update with specific frontend origins (e.g., https://tracker01.taheito26.pages.dev)
ALLOWED_ORIGINS = "http://localhost:8080,http://localhost:8081,http://localhost:5173,https://tracker.pages.dev,https://tracker01.pages.dev/,https://cryptotracker-api.taheito26.workers.dev,https://thetracker-rosy.vercel.app"

[triggers]
crons = ["*/2 * * * *"]

[[d1_databases]]
binding = "DB"
database_name = "crypto-tracker"
database_id = "e51dd932-5912-4a1b-b354-ff03bc25d23e"

[[kv_namespaces]]
binding = "PRICE_KV"
id = "5a8b838fa6fc43578654af2d14674439"
