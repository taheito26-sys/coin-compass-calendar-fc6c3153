name            = "cryptotracker-api"
main            = "src/index.ts"
compatibility_date = "2025-03-01"
compatibility_flags = ["nodejs_compat"]

# ── Cron Trigger — every 2 minutes ──
[triggers]
crons = ["*/2 * * * *"]

# ── D1 Database ─────────────────────────────────────────────────
[[d1_databases]]
binding         = "DB"
database_name   = "crypto-tracker"
database_id     = "PLACEHOLDER_D1_ID"           # Replace after: wrangler d1 create crypto-tracker

# ── KV Namespace ────────────────────────────────────────────────
[[kv_namespaces]]
binding = "PRICE_KV"
id      = "PLACEHOLDER_KV_ID"                   # Replace after: wrangler kv namespace create PRICE_KV

# ── Secrets (set via wrangler secret put) ───────────────────────
# CLERK_JWKS_URL     — e.g. https://your-clerk-domain.clerk.accounts.dev/.well-known/jwks.json
# ALLOWED_ORIGINS    — comma-separated list of frontend origins
